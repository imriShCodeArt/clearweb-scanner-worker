services:
  scanner-worker:
    image: ghcr.io/imrishcodeart/clearweb-scanner-worker:${IMAGE_TAG:-latest}
    pull_policy: always

    ports:
      - "${BIND_HOST:-127.0.0.1}:${HOST_PORT:-3000}:3000"

    env_file:
      - .env

    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      PLAYWRIGHT_HEADLESS: "true"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

    restart: unless-stopped

    init: true
    shm_size: "1gb"

    mem_limit: 4g
    cpus: 2.0

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    stop_grace_period: 35s
