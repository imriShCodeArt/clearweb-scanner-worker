# Reverse-proxy example for nginx.
# Terminate TLS on the host and forward only scan traffic to the worker.
# Health and metrics can stay on localhost for internal monitoring.

upstream scanner_worker {
    server 127.0.0.1:3000;
    keepalive 8;
}

server {
    listen 443 ssl http2;
    server_name scanner.example.com;

    ssl_certificate     /etc/letsencrypt/live/scanner.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scanner.example.com/privkey.pem;

    client_max_body_size 1m;

    location /api/scan {
        proxy_pass http://scanner_worker;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        return 404;
    }
}

