# Reverse-proxy example for nginx at scanner.clearweb.co.il.
# Terminate TLS on the host and forward scan API traffic to the worker on localhost.
# Health and metrics stay on 127.0.0.1:3000 for internal monitoring only.

upstream scanner_worker {
    server 127.0.0.1:3000;
    keepalive 8;
}

server {
    listen 443 ssl http2;
    server_name scanner.clearweb.co.il;

    ssl_certificate     /etc/letsencrypt/live/scanner.clearweb.co.il/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scanner.clearweb.co.il/privkey.pem;

    client_max_body_size 1m;

    # Matches POST /api/scan and GET /api/scan/:jobId
    location /api/scan {
        proxy_pass http://scanner_worker;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location / {
        return 404;
    }
}

