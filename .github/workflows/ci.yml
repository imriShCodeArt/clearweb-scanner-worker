name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare yarn@4.12.0 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test

  docker:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t clearweb-scanner-worker:ci .

      - name: Smoke test container
        run: |
          docker run -d --name scanner-worker -p 3000:3000 clearweb-scanner-worker:ci

          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health; then
              echo "Health check passed"
              docker logs scanner-worker
              docker stop scanner-worker
              exit 0
            fi
            sleep 2
          done

          echo "Health check failed"
          docker logs scanner-worker
          docker stop scanner-worker
          exit 1