name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy"
        required: false
        default: latest

  workflow_run:
    workflows: ["Publish container image"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest
    environment: production

    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || 'latest' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: ${{ secrets.VPS_DEPLOY_DIR }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            DEPLOY_DIR="${{ secrets.VPS_DEPLOY_DIR }}"
            IMAGE_TAG="${{ env.IMAGE_TAG }}"

            echo "Deploying image tag: $IMAGE_TAG"
            echo "Deploy directory: $DEPLOY_DIR"

            cd "$DEPLOY_DIR"

            if [ ! -f .env ]; then
              echo "Missing .env in $DEPLOY_DIR"
              exit 1
            fi

            set -a
            # shellcheck disable=SC1091
            source .env
            set +a

            HOST_PORT="${HOST_PORT:-3000}"
            BIND_HOST="${BIND_HOST:-127.0.0.1}"

            export IMAGE_TAG

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

            for i in $(seq 1 30); do
              if curl -sf "http://${BIND_HOST}:${HOST_PORT}/api/health/ready"; then
                echo "Deploy healthy"
                exit 0
              fi
              sleep 2
            done

            echo "Deploy readiness check failed"
            docker compose -f docker-compose.prod.yml logs --tail=100
            exit 1
