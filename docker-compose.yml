services:
  scanner-worker:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      API_KEY: ${API_KEY:?Set API_KEY in .env}
      SCAN_TIMEOUT_MS: ${SCAN_TIMEOUT_MS:-30000}
      MAX_CONCURRENT_SCANS: ${MAX_CONCURRENT_SCANS:-2}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-20}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      PLAYWRIGHT_HEADLESS: "true"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
